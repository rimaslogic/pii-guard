name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install test deps
        run: pip install pytest
      - name: Run tests
        run: pytest -q

  smoke-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install into isolated HOME
        run: |
          export HOME="$(mktemp -d)"
          python3 skill/installer/install.py --yes
          test -f "$HOME/.claude/pii-guard/guard.py"
          test -f "$HOME/.claude/pii-guard/cli.py"
          test -f "$HOME/.claude/settings.json"
          python3 "$HOME/.claude/pii-guard/cli.py" status
          python3 "$HOME/.claude/pii-guard/cli.py" test "card 4111 1111 1111 1111" | tee /tmp/out
          grep -q '\[CARD_1\]' /tmp/out
      - name: Uninstall cleanly
        run: |
          export HOME="$(mktemp -d)"
          python3 skill/installer/install.py --yes
          python3 skill/installer/uninstall.py --yes --purge
          test ! -d "$HOME/.claude/pii-guard"
